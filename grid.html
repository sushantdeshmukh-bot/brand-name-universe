.legend{bottom:20px;left:20px;display:flex;flex-direction:column;gap:2px;font-family:'DM Sans',sans-serif}

.ld{width:7px;height:7px;border-radius:50%}

.sb{position:fixed;top:16px;right:20px;z-index:10;width:240px}
.sb input{width:100%;padding:9px 12px 9px 32px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.sb input:focus{border-color:rgba(255,255,255,0.2)}
.sb input::placeholder{color:rgba(255,255,255,0.2)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2);font-size:13px}
.sr{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:rgba(12,12,15,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:8px;max-height:200px;overflow-y:auto;display:none;backdrop-filter:blur(20px)}
.sr.show{display:block}
.sri{padding:8px 14px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif}
.sri:hover{background:rgba(255,255,255,0.04);color:#fff}
.sri.add{color:#8B7FE8;border-top:1px solid rgba(255,255,255,0.04)}
.list-toggle{position:fixed;top:16px;right:280px;z-index:10;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 14px;color:rgba(255,255,255,0.5);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;letter-spacing:0.03em}
.list-toggle:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.list-toggle.active{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2)}
.list-panel{position:fixed;top:56px;right:20px;width:320px;max-height:calc(100vh - 120px);background:rgba(12,12,18,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:12px;z-index:15;display:none;flex-direction:column;backdrop-filter:blur(20px);overflow:hidden}
.list-panel.show{display:flex}
.list-header{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.list-header span{font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;font-family:'DM Sans',sans-serif}
.list-count{font-size:11px;color:rgba(255,255,255,0.2)}
.list-body{overflow-y:auto;flex:1;padding:6px 0}
.list-item{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s;font-family:'DM Sans',sans-serif}
.list-item:hover{background:rgba(255,255,255,0.04)}
.list-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.list-name{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500}
.list-tags{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.list-tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500}
.list-body::-webkit-scrollbar{width:4px}
.list-body::-webkit-scrollbar-track{background:transparent}
.list-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

  grd.addColorStop(0,'rgba(255,255,255,0.18)');grd.addColorStop(0.3,'rgba(255,255,255,0.04)');grd.addColorStop(1,'rgba(0,0,0,0.12)');
  g.fillStyle=grd;g.fillRect(4,4,248,248);
  // Border
  
  // Text
  var fs=Math.min(40,220/(name.length*0.55));
  g.font='700 '+Math.round(fs)+'px "DM Sans",sans-serif';
  g.textAlign='center';g.textBaseline='middle';
  g.fillStyle='rgba(255,255,255,1)';
  g.fillText(name,128,132);
  return c;
}

// Desaturated version
function makeCardTextureBW(name,color){
  var c=document.createElement('canvas');c.width=256;c.height=256;
  var g=c.getContext('2d');
  g.fillStyle='#0a0a0c';
  g.fillRect(0,0,256,256);
  g.fillStyle='#111116';
  g.fillRect(0,0,256,256);
  g.fillStyle='rgba(60,60,60,0.15)';
  g.fillRect(0,0,256,256);
  var grd=g.createLinearGradient(0,0,0,256);
  grd.addColorStop(0,'rgba(255,255,255,0.08)');grd.addColorStop(0.3,'rgba(255,255,255,0.01)');grd.addColorStop(1,'rgba(0,0,0,0.06)');
  g.fillStyle=grd;g.fillRect(4,4,248,248);
  
  var fs=Math.min(40,220/(name.length*0.55));
  g.font='700 '+Math.round(fs)+'px "DM Sans",sans-serif';
  g.textAlign='center';g.textBaseline='middle';
  g.fillStyle='rgba(255,255,255,0.4)';
  g.fillText(name,128,132);
  return c;
}

function init(){
  var W=innerWidth,H=innerHeight;
  var aspect=W/H;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0a0c);

  // Ortho camera exactly like the source: left=-1, right=1, top=1, bottom=-1
  camera=new THREE.OrthographicCamera(-1,1,1,-1,0,100);
  camera.position.z=5;

  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.getElementById('cv').appendChild(renderer.domElement);

  // Grid dimensions — one card per ~100px, odd numbers for centering
  COLS=Math.floor(W/100)|1;
  ROWS=Math.floor(H/100)|1;

  // Card scale in camera space
  var viewW=camera.right-camera.left; // = 2
  var colW=viewW/COLS;
  var defaultScaleX=colW;
  var defaultScaleY=colW*aspect;

  var isPortrait=W<H;
  var scaleFactor=isPortrait?2:4;
  var maxScaleX=defaultScaleX*scaleFactor;
  var maxScaleY=defaultScaleY*scaleFactor;

  sharedGeom=new THREE.PlaneGeometry(1,1);

  for(var i=0;i<COLS;i++){
    for(var j=0;j<ROWS;j++){
      var idx=(i*ROWS+j)%N;
      var d=all[idx];

      // Two textures: color and BW
      var texColor=new THREE.CanvasTexture(makeCardTexture(d.name,d.col));
      texColor.minFilter=THREE.LinearFilter;
      var texBW=new THREE.CanvasTexture(makeCardTextureBW(d.name,d.col));
      texBW.minFilter=THREE.LinearFilter;

      // Custom shader material — blends color and BW based on distance
      var mat=new THREE.ShaderMaterial({
        uniforms:{
          uTexColor:{value:texColor},
          uTexBW:{value:texBW},
          uDistance:{value:0}
        },
        vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
        fragmentShader:'uniform sampler2D uTexColor;uniform sampler2D uTexBW;uniform float uDistance;varying vec2 vUv;void main(){vec4 col=texture2D(uTexColor,vUv);vec4 bw=texture2D(uTexBW,vUv);float f=min(max(uDistance,0.),1.);gl_FragColor=mix(col,bw,f);}',
        transparent:false
      });

      var mesh=new THREE.Mesh(sharedGeom,mat);

      // Grid position in camera space
      var cardW=defaultScaleX*0.5;
      var cardH=defaultScaleY*0.5;
      var gx=THREE.MathUtils.mapLinear(i,0,COLS,camera.left,camera.right)+cardW;
      var gy=THREE.MathUtils.mapLinear(j,0,ROWS,camera.bottom,camera.top)+cardH;

      // Mesh scale = the card visual size
      mesh.scale.set(defaultScaleX,defaultScaleY,1);

      // Object3D wrapper for the 0.4 default scale
      var wrapper=new THREE.Object3D();
      wrapper.add(mesh);
      wrapper.scale.set(0.4,0.4,1);

      // Start at center (0,0) for intro animation
      wrapper.position.set(0,0,0);

      scene.add(wrapper);

      cardData.push({
        wrapper:wrapper,
        mesh:mesh,
        mat:mat,
        gridX:gx,
        gridY:gy,
        defaultScaleX:defaultScaleX,
        defaultScaleY:defaultScaleY,
        maxScaleX:maxScaleX,
        maxScaleY:maxScaleY,
        targetScaleX:defaultScaleX,
        targetScaleY:defaultScaleY,
        tags:d.tags,
        name:d.name
      });
    }
  }

  // Mouse
  window.addEventListener('mousemove',function(e){
    targetMouse.x=(e.clientX-W*0.5)/W*2;
    targetMouse.y=-(e.clientY-H*0.5)/H*2;
  });
  window.addEventListener('touchmove',function(e){
    var t=e.touches[0];
    targetMouse.x=(t.clientX-W*0.5)/W*2;
    targetMouse.y=-(t.clientY-H*0.5)/H*2;
  },{passive:true});

  buildLegend();
  animate();
}

function animate(){
  requestAnimationFrame(animate);
  var now=performance.now();
  var dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.1)dt=0.1;

  // Smooth mouse — matching source: 1 - pow(0.0125, dt)
  var ml=1-Math.pow(0.0125,dt);
  mousePos.x+=(targetMouse.x-mousePos.x)*ml;
  mousePos.y+=(targetMouse.y-mousePos.y)*ml;

  var aspect=innerWidth/innerHeight;

  for(var i=0;i<cardData.length;i++){
    var c=cardData[i];
    var isAct=activeCat==='all'||c.tags.indexOf(activeCat)>=0;

    // --- POSITION: Intro animation (slide from center to grid pos) ---
    var distX=Math.abs(c.gridX-c.wrapper.position.x);
    var tpx=c.gridX;
    var tpy=distX<0.075?c.gridY:0; // Y only starts when X is close
    var tpz=c.wrapper.position.z;

    var posLerp=1-Math.pow(0.005/COLS,dt);
    c.wrapper.position.x+=(tpx-c.wrapper.position.x)*posLerp;
    c.wrapper.position.y+=(tpy-c.wrapper.position.y)*posLerp;

    // --- SCALE: Distance-based magnification ---
    var dx=mousePos.x-c.wrapper.position.x;
    var dy=(mousePos.y-c.wrapper.position.y)/aspect;
    var distance=dx*dx+dy*dy;
    distance*=(aspect>1?12:3);

    var influence=Math.max(1-distance,0);

    if(!isAct){
      c.targetScaleX=c.defaultScaleX*0.3;
      c.targetScaleY=c.defaultScaleY*0.3;
    }else{
      c.targetScaleX=THREE.MathUtils.lerp(c.defaultScaleX,c.maxScaleX,influence);
      c.targetScaleY=THREE.MathUtils.lerp(c.defaultScaleY,c.maxScaleY,influence);
    }

    // Smooth scale — matching source: 1 - pow(0.0002, dt)
    var sl=1-Math.pow(0.0002,dt);
    c.mesh.scale.x+=(c.targetScaleX-c.mesh.scale.x)*sl;
    c.mesh.scale.y+=(c.targetScaleY-c.mesh.scale.y)*sl;

    // Z-sort: closer to mouse = on top
    c.wrapper.position.z=-distance;

    // Shader: distance controls color↔BW blend
    c.mat.uniforms.uDistance.value=isAct?distance:1;
  }

  renderer.render(scene,camera);
}

function buildLegend(){
  var el=document.getElementById('leg');
  var h='<div class="li active" data-c="all" onclick="filt(\'all\')"><div class="ld" style="background:#666"></div>All</div>';
  catKeys.forEach(function(k){h+='<div class="li" data-c="'+k+'" onclick="filt(\''+k+'\')"><div class="ld" style="background:#'+CATS[k].c.toString(16).padStart(6,'0')+'"></div>'+CATS[k].label+'</div>'});
  el.innerHTML=h;
}
function filt(c){activeCat=c;document.querySelectorAll('.li').forEach(function(el){el.classList.toggle('active',el.dataset.c===c)});if(document.getElementById('listPanel').classList.contains('show'))renderList()}

function focusOnName(name){
  // Find the card with this name and move it to center by swapping grid positions
  var targetIdx=-1;
  for(var i=0;i<cardData.length;i++){
    if(cardData[i].name===name){targetIdx=i;break}
  }
  if(targetIdx<0)return;

  // Find the card closest to center (0,0)
  var centerIdx=0,centerDist=Infinity;
  for(var i=0;i<cardData.length;i++){
    var d=Math.abs(cardData[i].gridX)+Math.abs(cardData[i].gridY);
    if(d<centerDist){centerDist=d;centerIdx=i}
  }

  // Swap grid positions
  var tx=cardData[targetIdx].gridX, ty=cardData[targetIdx].gridY;
  cardData[targetIdx].gridX=cardData[centerIdx].gridX;
  cardData[targetIdx].gridY=cardData[centerIdx].gridY;
  cardData[centerIdx].gridX=tx;
  cardData[centerIdx].gridY=ty;

  // Move mouse to center to highlight it
  targetMouse.x=0;targetMouse.y=0;
}

// Search
var si=document.getElementById('si'),sr=document.getElementById('sr');
si.addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  if(q.length<1){sr.classList.remove('show');return}
  var names=[];
  for(var i=0;i<cardData.length;i++){
    if(cardData[i].name.toLowerCase().indexOf(q)>=0)names.push(cardData[i].name);
  }
  // Dedupe
  var seen={},unique=[];
  for(var i=0;i<names.length;i++){if(!seen[names[i]]){seen[names[i]]=true;unique.push(names[i])}}
  unique=unique.slice(0,8);

  var h='';
  for(var i=0;i<unique.length;i++){
    h+='<div class="sri" data-n="'+unique[i]+'">'+unique[i]+'</div>';
  }
  var exact=false;
  for(var i=0;i<unique.length;i++){if(unique[i].toLowerCase()===q){exact=true;break}}
  if(!exact&&q.length>1){
    h+='<div class="sri add" data-a="'+this.value.trim()+'">+ Add "'+this.value.trim()+'"</div>';
  }
  sr.innerHTML=h;sr.classList.add('show');
  sr.querySelectorAll('.sri:not(.add)').forEach(function(el){
    el.onclick=function(){focusOnName(this.dataset.n);sr.classList.remove('show');si.value='';si.blur()}
  });
  sr.querySelectorAll('.sri.add').forEach(function(el){
    el.onclick=function(){sr.classList.remove('show');si.value='';si.blur();alert('Add name feature coming soon')}
  });
});
si.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var q=this.value.trim().toLowerCase();
    var found=null;
    for(var i=0;i<cardData.length;i++){if(cardData[i].name.toLowerCase().indexOf(q)>=0){found=cardData[i].name;break}}
    if(found){focusOnName(found);sr.classList.remove('show');this.value='';this.blur()}
  }
  if(e.key==='Escape'){sr.classList.remove('show');this.blur()}
});
document.addEventListener('click',function(e){if(!e.target.closest('.sb'))sr.classList.remove('show')});

// List view
function toggleList(){
  var p=document.getElementById('listPanel'),b=document.getElementById('listToggle');
  var s=p.classList.toggle('show');b.classList.toggle('active',s);
  if(s)renderList();
}
function renderList(){
  var body=document.getElementById('listBody'),filtered=[];
  var seen={};
  for(var i=0;i<cardData.length;i++){
    var cd=cardData[i];
    if(seen[cd.name])continue;seen[cd.name]=true;
    var isAct=activeCat==='all'||cd.tags.indexOf(activeCat)>=0;
    if(isAct)filtered.push(cd);
  }
  filtered.sort(function(a,b){return a.name.localeCompare(b.name)});
  document.getElementById('listCount').textContent=filtered.length+' names';
  var h='';
  for(var i=0;i<filtered.length;i++){
    var f=filtered[i];
    var dc='#'+(f.tags.length>0&&CATS[f.tags[0]]?CATS[f.tags[0]].c:0x888888).toString(16).padStart(6,'0');
    var th='';
    for(var t=0;t<f.tags.length;t++){
      var ci=CATS[f.tags[t]];
      if(ci){var hex='#'+ci.c.toString(16).padStart(6,'0');th+='<span class="list-tag" style="background:'+hex+'22;color:'+hex+'">'+ci.label+'</span>'}
    }
    var safeName=f.name.replace(/'/g,"\\'");
    h+='<div class="list-item" onclick="focusOnName(\''+safeName+'\')"><div class="list-dot" style="background:'+dc+'"></div><span class="list-name">'+f.name+'</span><div class="list-tags">'+th+'</div></div>';
  }
  body.innerHTML=h;
}

// Patch filt to update list
var _origFilt=filt;

init();
</script>
