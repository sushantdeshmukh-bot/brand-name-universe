<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Name Universe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;color:#fff}
#cv{position:fixed;top:0;left:0;width:100%;height:100%}
.ui{position:fixed;z-index:10;pointer-events:none}
.ui>*{pointer-events:auto}
.top{top:0;left:0;right:0;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.branding h1{font-size:13px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:0.06em;text-transform:uppercase}
.branding p{font-size:11px;color:rgba(255,255,255,0.2);margin-top:3px;font-weight:300}
.sb{position:relative;width:240px;flex-shrink:0}
.sb input{width:100%;padding:9px 12px 9px 32px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.sb input:focus{border-color:rgba(255,255,255,0.2)}
.sb input::placeholder{color:rgba(255,255,255,0.2)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2);font-size:13px}
.sr{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:rgba(12,12,15,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:8px;max-height:200px;overflow-y:auto;display:none;backdrop-filter:blur(20px)}
.sr.show{display:block}
.sri{padding:8px 14px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif}
.sri:hover{background:rgba(255,255,255,0.04);color:#fff}
.legend{bottom:20px;left:20px;display:flex;flex-direction:column;gap:2px}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,0.2);cursor:pointer;padding:3px 8px;border-radius:4px}
.li:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5)}
.li.active{color:rgba(255,255,255,0.5);font-weight:500}
.ld{width:7px;height:7px;border-radius:50%}
.ctrl{bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;background:rgba(12,12,15,0.8);padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.06)}
.ctrl label{font-size:10px;color:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctrl input[type=range]{width:100px;accent-color:#666}
.ctrl span{font-size:10px;color:rgba(255,255,255,0.4);min-width:28px;text-align:right}
#tt{position:fixed;display:none;pointer-events:none;z-index:20}
#ttcard{background:rgba(12,12,15,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;backdrop-filter:blur(20px)}
#ttn{font-size:16px;font-weight:700;color:#fff}
#tttags{margin-top:3px;display:flex;flex-wrap:wrap;gap:3px}
#tttags span{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
#ttmeta{font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px}
.list-toggle{position:fixed;top:16px;right:280px;z-index:10;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 14px;color:rgba(255,255,255,0.5);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;letter-spacing:0.03em}
.list-toggle:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.list-toggle.active{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2)}
.list-panel{position:fixed;top:56px;right:20px;width:320px;max-height:calc(100vh - 120px);background:rgba(12,12,18,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:12px;z-index:15;display:none;flex-direction:column;backdrop-filter:blur(20px);overflow:hidden}
.list-panel.show{display:flex}
.list-header{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.list-header span{font-size:12px;color:rgba(255,255,255,0.5);font-weight:500}
.list-count{font-size:11px;color:rgba(255,255,255,0.2)}
.list-body{overflow-y:auto;flex:1;padding:6px 0}
.list-item{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s}
.list-item:hover{background:rgba(255,255,255,0.04)}
.list-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.list-name{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500}
.list-tags{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.list-tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500}
.list-body::-webkit-scrollbar{width:4px}
.list-body::-webkit-scrollbar-track{background:transparent}
.list-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.view-toggle{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;font-family:'DM Sans',sans-serif}
.view-toggle a{padding:7px 16px;font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;font-weight:500;letter-spacing:0.03em}
.view-toggle a.active{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.view-toggle a:hover:not(.active){color:rgba(255,255,255,0.5)}
</style>
</head>

  var csug=['rize','tomoro','movo','savvi','prospr','wiserly','runn','fynd','belo','nivo','censo','digo','finin','stok','smrt','taarakki','indify','niyamo','onvest','stephin'];
  if(csug.indexOf(l)>=0)tags.push('coined-suggestive');
  var cabs=['siphiesta','siphy','riave','allo','fortuno','ayosh','nexsment','nextm','finosophy','wealthitude'];
  if(cabs.indexOf(l)>=0)tags.push('coined-abstract');
  else if(x>0.5&&Math.abs(y)<0.2&&tags.length===0)tags.push('coined-abstract');
  var desc=['agile','alive','brisk','buoyant','dynamic','elastic','fluid','kinetic','lively','mobile','prompt','swift','vivid','vital','vibrant','zeal','zippy','anchored','balanced','bedrock','calm','composed','constant','durable','lasting','measured','mellow','patient','poised','rooted','secure','settled','stable','still','whole','adept','apt','discerning','earnest','gallant','hardy','lucid','plucky','resolute','robust','sage','seasoned','staunch','tenacious','valiant','clever','sharp','bright','astute','savvy','shrewd','canny','witty','acute','quick','nimble','slick','adroit','deft','gifted','brilliant','wise','informed','aware','ahead','deep','crisp','focused','alert','awake','vast','grand','neat','plain','right','set','sure','true','bold','brave','solid','steady','keen','fair','proper','frank','clear','worthy'];
  if(desc.indexOf(l)>=0)tags.push('english-descriptors');
  var rp=['market','mint','stack','pocket','claim','rally','begin','simply','tiger','varo','baro'];
  if(rp.indexOf(l)>=0)tags.push('real-product');
  if(tags.length===0){
    if(x<-0.3&&z<-0.2)tags.push('english-descriptors');
    else if(x>0.3)tags.push('coined-abstract');
    else if(y<-0.2)tags.push('fintech-compounds');
    else if(z>0.2)tags.push('hindi-rooted');
    else tags.push('real-product');
  }
  return tags;
}

function makeTextCanvas(text,color){
  var c=document.createElement('canvas');
  var ctx=c.getContext('2d');
  var fontSize=56;
  ctx.font='700 '+fontSize+'px DM Sans,sans-serif';
  var tw=ctx.measureText(text).width;
  var pw=tw+72;
  var ph=fontSize+36;
  c.width=pw;c.height=ph;
  var cr=((color>>16)&255),cg=((color>>8)&255),cb=(color&255);
  var r=ph/2;
  function pillPath(inset){
    ctx.beginPath();var ri=r-inset;
    ctx.moveTo(ri+inset,inset);ctx.lineTo(pw-ri-inset,inset);ctx.arc(pw-ri-inset,r,ri,Math.PI*1.5,Math.PI*0.5);
    ctx.lineTo(ri+inset,ph-inset);ctx.arc(ri+inset,r,ri,Math.PI*0.5,Math.PI*1.5);ctx.closePath();
  }
  pillPath(0);ctx.fillStyle='rgba(12,12,18,0.7)';ctx.fill();
  pillPath(0);ctx.fillStyle='rgba('+cr+','+cg+','+cb+',0.25)';ctx.fill();
  pillPath(0);ctx.fillStyle='rgba('+cr+','+cg+','+cb+',0.12)';ctx.fill();
  ctx.save();pillPath(0);ctx.clip();
  var grad=ctx.createLinearGradient(0,0,0,ph);
  grad.addColorStop(0,'rgba(255,255,255,0.22)');grad.addColorStop(0.3,'rgba(255,255,255,0.08)');
  grad.addColorStop(0.5,'rgba(255,255,255,0.02)');grad.addColorStop(0.6,'rgba(0,0,0,0)');grad.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,pw,ph);ctx.restore();
  ctx.save();pillPath(0);ctx.clip();
  var grad2=ctx.createLinearGradient(0,ph*0.6,0,ph);
  grad2.addColorStop(0,'rgba('+cr+','+cg+','+cb+',0)');grad2.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0.15)');
  ctx.fillStyle=grad2;ctx.fillRect(0,0,pw,ph);ctx.restore();
  ctx.save();pillPath(2.5);ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  pillPath(1);ctx.strokeStyle='rgba('+cr+','+cg+','+cb+',0.5)';ctx.lineWidth=2.5;ctx.stroke();
  ctx.font='700 '+fontSize+'px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText(text,pw/2+1,ph/2+3);
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fillText(text,pw/2,ph/2+1);
  return {canvas:c,w:pw,h:ph};
}

var all=SEED.map(function(d){return{name:d.n,x:d.x,y:d.y,z:d.z}});
var N=all.length,R=600;
var scene,camera,renderer,group,controls;
var linesMesh,positions,colors;
var particleData=[],particlePositions,sprites=[];
var maxConnections=6,minDist=100,driftSpeed=0.15;
var activeCat='all',catKeys=Object.keys(CATS);
var isPaused=false,pauseTimer=null,pauseDuration=5000;
var flyingNow=false;

// Simple orbit state
var theta=0,phi=Math.PI/4,camDist=1000;
var isDrag=false,prevX=0,prevY=0,startDX=0,startDY=0;
var spaceDown=false;

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,5000);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.getElementById('cv').appendChild(renderer.domElement);
  group=new THREE.Group();scene.add(group);

  var box=new THREE.BoxHelper(new THREE.Mesh(new THREE.BoxGeometry(R,R,R)),0x333333);
  box.material.transparent=true;box.material.opacity=0.06;group.add(box);

  particlePositions=new Float32Array(N*3);
  for(var i=0;i<N;i++){
    var d=all[i],tags=getTags(d.name,d.x,d.y,d.z);
    var col=CATS[tags[0]]?CATS[tags[0]].c:0x888888;
    var jx=(Math.random()-0.5),jy=(Math.random()-0.5),jz=(Math.random()-0.5);
    var px=(d.x*R*0.35+jx*R*0.35)*2;
    var py=(d.y*R*0.35+jy*R*0.35)*2;
    var pz=(d.z*R*0.35+jz*R*0.35)*2;
    particlePositions[i*3]=px;particlePositions[i*3+1]=py;particlePositions[i*3+2]=pz;
    var tc=makeTextCanvas(d.name,col);
    var tex=new THREE.CanvasTexture(tc.canvas);tex.minFilter=THREE.LinearFilter;
    var mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    var sprite=new THREE.Sprite(mat);
    var scale=tc.w/12;sprite.scale.set(scale,scale*(tc.h/tc.w),1);
    sprite.position.set(px,py,pz);sprite.renderOrder=1;sprite.material.depthTest=false;
    group.add(sprite);sprites.push(sprite);
    particleData.push({velocity:new THREE.Vector3((Math.random()-0.5)*0.3,(Math.random()-0.5)*0.3,(Math.random()-0.5)*0.3),numConnections:0,tags:tags,name:d.name,col:col,jx:jx,jy:jy,jz:jz,ox:d.x,oy:d.y,oz:d.z});
  }

  var maxSegs=N*maxConnections;
  positions=new Float32Array(maxSegs*6);colors=new Float32Array(maxSegs*6);
  var lGeo=new THREE.BufferGeometry();
  lGeo.setAttribute('position',new THREE.BufferAttribute(positions,3).setUsage(THREE.DynamicDrawUsage));
  lGeo.setAttribute('color',new THREE.BufferAttribute(colors,3).setUsage(THREE.DynamicDrawUsage));
  lGeo.setDrawRange(0,0);
  var lMat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.65,linewidth:2,depthWrite:false});
  linesMesh=new THREE.LineSegments(lGeo,lMat);linesMesh.renderOrder=0;group.add(linesMesh);

  // Set initial camera
  updateCamera();

  // Events
  window.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();spaceDown=true}});
  window.addEventListener('keyup',function(e){if(e.code==='Space')spaceDown=false});

  renderer.domElement.addEventListener('mousedown',function(e){
    isDrag=true;prevX=e.clientX;prevY=e.clientY;startDX=e.clientX;startDY=e.clientY;
  });

  window.addEventListener('mousemove',function(e){
    if(isDrag){
      var dx=e.clientX-prevX,dy=e.clientY-prevY;
      if(!flyingNow){
        theta-=dx*0.005;
        phi-=dy*0.005;
        phi=Math.max(0.1,Math.min(Math.PI-0.1,phi));
        if(isPaused){isPaused=false;if(pauseTimer)clearTimeout(pauseTimer)}
      }
      prevX=e.clientX;prevY=e.clientY;
      return;
    }
    // Hover
    var mx=(e.clientX/innerWidth)*2-1,my=-(e.clientY/innerHeight)*2+1;
    var rc=new THREE.Raycaster();rc.setFromCamera(new THREE.Vector2(mx,my),camera);
    var hits=rc.intersectObjects(sprites);
    var tt=document.getElementById('tt');
    if(hits.length>0){
      var idx=sprites.indexOf(hits[0].object);
      if(idx>=0){
        var pd=particleData[idx];
        document.getElementById('ttn').textContent=pd.name;
        var th='';pd.tags.forEach(function(t){var ci=CATS[t];if(ci){var hex='#'+ci.c.toString(16).padStart(6,'0');th+='<span style="background:'+hex+'33;color:'+hex+'">'+ci.label+'</span>'}});
        document.getElementById('tttags').innerHTML=th;
        document.getElementById('ttmeta').textContent=(pd.ox<-0.3?'Real word':pd.ox>0.3?'Coined':'Compound')+' · '+(pd.oy<-0.3?'Product':pd.oy>0.3?'Feeling':'Neutral')+' · '+(pd.oz<-0.3?'English':pd.oz>0.3?'Indian':'Mixed');
        var tx=e.clientX+16,ty=e.clientY-40;if(tx+200>innerWidth)tx=e.clientX-210;if(ty<10)ty=e.clientY+16;
        tt.style.display='block';tt.style.left=tx+'px';tt.style.top=ty+'px';
        renderer.domElement.style.cursor='pointer';
      }
    }else{tt.style.display='none';renderer.domElement.style.cursor='grab'}
  });

  window.addEventListener('mouseup',function(e){
    var wasDrag=Math.abs(e.clientX-startDX)>5||Math.abs(e.clientY-startDY)>5;
    isDrag=false;renderer.domElement.style.cursor='grab';
    if(!wasDrag&&!flyingNow){
      var mx=(e.clientX/innerWidth)*2-1,my=-(e.clientY/innerHeight)*2+1;
      var rc=new THREE.Raycaster();rc.setFromCamera(new THREE.Vector2(mx,my),camera);
      var hits=rc.intersectObjects(sprites);
      if(hits.length>0){var idx=sprites.indexOf(hits[0].object);if(idx>=0)flyToName(particleData[idx].name)}
    }
  });

  renderer.domElement.addEventListener('wheel',function(e){
    e.preventDefault();
    if(isPaused){isPaused=false;if(pauseTimer)clearTimeout(pauseTimer)}
    camDist*=e.deltaY>0?1.06:0.94;
    camDist=Math.max(50,Math.min(4000,camDist));
  },{passive:false});

  var tD=0;
  renderer.domElement.addEventListener('touchstart',function(e){if(e.touches.length===1){isDrag=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;startDX=prevX;startDY=prevY}if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tD=Math.sqrt(dx*dx+dy*dy)}},{passive:true});
  renderer.domElement.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1&&isDrag&&!flyingNow){var dx=e.touches[0].clientX-prevX,dy=e.touches[0].clientY-prevY;theta-=dx*0.005;phi-=dy*0.005;phi=Math.max(0.1,Math.min(Math.PI-0.1,phi));prevX=e.touches[0].clientX;prevY=e.touches[0].clientY}if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;var d=Math.sqrt(dx*dx+dy*dy);var amp=1+(tD/d-1)*2;camDist*=amp;camDist=Math.max(50,Math.min(4000,camDist));tD=d}},{passive:false});
  renderer.domElement.addEventListener('touchend',function(){isDrag=false});

  document.getElementById('rDist').oninput=function(){minDist=+this.value;document.getElementById('vDist').textContent=this.value};
  document.getElementById('rSpeed').oninput=function(){driftSpeed=this.value/100;document.getElementById('vSpeed').textContent=this.value};
  document.getElementById('rMax').oninput=function(){maxConnections=+this.value;document.getElementById('vMax').textContent=this.value};
  document.getElementById('rSpread').oninput=function(){
    var s=this.value/100;document.getElementById('vSpread').textContent=this.value;
    for(var i=0;i<N;i++){var d=all[i];var bx=d.x*R*0.35+particleData[i].jx*R*0.35;var by=d.y*R*0.35+particleData[i].jy*R*0.35;var bz=d.z*R*0.35+particleData[i].jz*R*0.35;
    particlePositions[i*3]=bx*s;particlePositions[i*3+1]=by*s;particlePositions[i*3+2]=bz*s;sprites[i].position.set(particlePositions[i*3],particlePositions[i*3+1],particlePositions[i*3+2])}
  };

  window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

  buildLegend();animate();
}

function updateCamera(){
  camera.position.x=camDist*Math.sin(phi)*Math.sin(theta);
  camera.position.y=camDist*Math.cos(phi);
  camera.position.z=camDist*Math.sin(phi)*Math.cos(theta);
  camera.lookAt(scene.position);
}

function buildLegend(){
  var el=document.getElementById('leg');
  var h='<div class="li active" data-c="all" onclick="filt(\'all\')"><div class="ld" style="background:#666"></div>All</div>';
  catKeys.forEach(function(k){h+='<div class="li" data-c="'+k+'" onclick="filt(\''+k+'\')"><div class="ld" style="background:#'+CATS[k].c.toString(16).padStart(6,'0')+'"></div>'+CATS[k].label+'</div>'});
  el.innerHTML=h;
}
function filt(c){
  activeCat=c;document.querySelectorAll('.li').forEach(function(el){el.classList.toggle('active',el.dataset.c===c)});
  for(var i=0;i<N;i++){var pd=particleData[i];sprites[i].material.opacity=(activeCat==='all'||pd.tags.indexOf(activeCat)>=0)?1:0.08}
  if(document.getElementById('listPanel').classList.contains('show'))renderList();
}

function animate(){
  requestAnimationFrame(animate);
  if(flyingNow)return; // fly handles its own render

  var shouldMove=!isPaused;
  var rH=R/2*((document.getElementById('rSpread').value||200)/100);

  for(var i=0;i<N;i++){
    var pd=particleData[i];
    if(shouldMove){
      particlePositions[i*3]+=pd.velocity.x*driftSpeed;particlePositions[i*3+1]+=pd.velocity.y*driftSpeed;particlePositions[i*3+2]+=pd.velocity.z*driftSpeed;
      if(particlePositions[i*3]<-rH||particlePositions[i*3]>rH)pd.velocity.x=-pd.velocity.x;
      if(particlePositions[i*3+1]<-rH||particlePositions[i*3+1]>rH)pd.velocity.y=-pd.velocity.y;
      if(particlePositions[i*3+2]<-rH||particlePositions[i*3+2]>rH)pd.velocity.z=-pd.velocity.z;
      sprites[i].position.set(particlePositions[i*3],particlePositions[i*3+1],particlePositions[i*3+2]);
    }
    pd.numConnections=0;
  }

  var vp=0,cp=0,nc=0;
  for(var i=0;i<N;i++){var pd=particleData[i];if(pd.numConnections>=maxConnections)continue;
    for(var j=i+1;j<N;j++){var pd2=particleData[j];if(pd2.numConnections>=maxConnections)continue;
      var dx=particlePositions[i*3]-particlePositions[j*3],dy=particlePositions[i*3+1]-particlePositions[j*3+1],dz=particlePositions[i*3+2]-particlePositions[j*3+2];
      var dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(dist<minDist){pd.numConnections++;pd2.numConnections++;var alpha=Math.pow(1-dist/minDist,0.5);
        var c1=new THREE.Color(pd.col),c2=new THREE.Color(pd2.col);
        var oyi=sprites[i].scale.y*0.55,oyj=sprites[j].scale.y*0.55;
        positions[vp++]=particlePositions[i*3];positions[vp++]=particlePositions[i*3+1]-oyi;positions[vp++]=particlePositions[i*3+2];
        positions[vp++]=particlePositions[j*3];positions[vp++]=particlePositions[j*3+1]-oyj;positions[vp++]=particlePositions[j*3+2];
        colors[cp++]=c1.r*alpha;colors[cp++]=c1.g*alpha;colors[cp++]=c1.b*alpha;
        colors[cp++]=c2.r*alpha;colors[cp++]=c2.g*alpha;colors[cp++]=c2.b*alpha;nc++}}}
  linesMesh.geometry.setDrawRange(0,nc*2);
  linesMesh.geometry.attributes.position.needsUpdate=true;
  linesMesh.geometry.attributes.color.needsUpdate=true;

  if(shouldMove)theta+=0.0003;
  updateCamera();
  renderer.render(scene,camera);
}

function flyToName(name){
  var idx=-1;for(var i=0;i<N;i++)if(particleData[i].name===name){idx=i;break}
  if(idx<0)return;

  flyingNow=true;isPaused=true;
  if(pauseTimer)clearTimeout(pauseTimer);

  var wp=new THREE.Vector3();sprites[idx].getWorldPosition(wp);

  // Compute target orbit angles that would center this pill
  var tTheta=Math.atan2(wp.x,wp.z);
  var distXZ=Math.sqrt(wp.x*wp.x+wp.z*wp.z);
  var tPhi=Math.atan2(distXZ,wp.y);
  // Target distance: close enough to read
  var wpDist=wp.length();
  var tDist=Math.max(80,wpDist+60);

  var sTheta=theta,sPhi=phi,sDist=camDist;
  var t0=performance.now(),dur=1400;
  var osx=sprites[idx].scale.x,osy=sprites[idx].scale.y;

  function tick(){
    var t=Math.min(1,(performance.now()-t0)/dur);
    var e=t*t*t*(t*(t*6-15)+10);

    theta=sTheta+(tTheta-sTheta)*e;
    phi=sPhi+(tPhi-sPhi)*e;
    camDist=sDist+(tDist-sDist)*e;
    updateCamera();

    if(t>0.7){var p=1+Math.sin((t-0.7)*Math.PI*4)*0.04*(1-t);sprites[idx].scale.set(osx*p,osy*p,1)}

    // Still update particles + lines during flight
    var rH=R/2*((document.getElementById('rSpread').value||200)/100);
    for(var i=0;i<N;i++)particleData[i].numConnections=0;
    var vp=0,cp=0,nc=0;
    for(var i=0;i<N;i++){var pd=particleData[i];if(pd.numConnections>=maxConnections)continue;
      for(var j=i+1;j<N;j++){var pd2=particleData[j];if(pd2.numConnections>=maxConnections)continue;
        var dx=particlePositions[i*3]-particlePositions[j*3],dy=particlePositions[i*3+1]-particlePositions[j*3+1],dz=particlePositions[i*3+2]-particlePositions[j*3+2];
        var dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(dist<minDist){pd.numConnections++;pd2.numConnections++;var alpha=Math.pow(1-dist/minDist,0.5);
          var c1=new THREE.Color(pd.col),c2=new THREE.Color(pd2.col);
          var oyi=sprites[i].scale.y*0.55,oyj=sprites[j].scale.y*0.55;
          positions[vp++]=particlePositions[i*3];positions[vp++]=particlePositions[i*3+1]-oyi;positions[vp++]=particlePositions[i*3+2];
          positions[vp++]=particlePositions[j*3];positions[vp++]=particlePositions[j*3+1]-oyj;positions[vp++]=particlePositions[j*3+2];
          colors[cp++]=c1.r*alpha;colors[cp++]=c1.g*alpha;colors[cp++]=c1.b*alpha;
          colors[cp++]=c2.r*alpha;colors[cp++]=c2.g*alpha;colors[cp++]=c2.b*alpha;nc++}}}
    linesMesh.geometry.setDrawRange(0,nc*2);
    linesMesh.geometry.attributes.position.needsUpdate=true;
    linesMesh.geometry.attributes.color.needsUpdate=true;

    renderer.render(scene,camera);

    if(t<1){requestAnimationFrame(tick)}
    else{
      sprites[idx].scale.set(osx,osy,1);
      flyingNow=false;
      // isPaused stays true — resumes after timer
      pauseTimer=setTimeout(function(){isPaused=false},pauseDuration);
    }
  }
  tick();
}

// Search
var si=document.getElementById('si'),sr=document.getElementById('sr');
si.addEventListener('input',function(){var q=this.value.trim().toLowerCase();if(q.length<1){sr.classList.remove('show');return}
  var mt=all.filter(function(n){return n.name.toLowerCase().includes(q)}).slice(0,8);
  var h='';mt.forEach(function(m){h+='<div class="sri" data-n="'+m.name+'">'+m.name+'</div>'});
  sr.innerHTML=h;sr.classList.add('show');
  sr.querySelectorAll('.sri').forEach(function(el){el.onclick=function(){flyToName(this.dataset.n);sr.classList.remove('show');si.value='';si.blur()}});
});
si.addEventListener('keydown',function(e){
  if(e.key==='Enter'){var q=this.value.trim().toLowerCase();var m=all.find(function(n){return n.name.toLowerCase().includes(q)});if(m){flyToName(m.name);sr.classList.remove('show');this.value='';this.blur()}}
  if(e.key==='Escape'){sr.classList.remove('show');this.blur()}
});
document.addEventListener('click',function(e){if(!e.target.closest('.sb'))sr.classList.remove('show')});

// List
function toggleList(){var p=document.getElementById('listPanel'),b=document.getElementById('listToggle');var s=p.classList.toggle('show');b.classList.toggle('active',s);if(s)renderList()}
function renderList(){
  var body=document.getElementById('listBody'),filtered=[];
  for(var i=0;i<N;i++){var pd=particleData[i];if(activeCat==='all'||pd.tags.indexOf(activeCat)>=0)filtered.push({idx:i,name:pd.name,tags:pd.tags,col:pd.col})}
  filtered.sort(function(a,b){return a.name.localeCompare(b.name)});
  document.getElementById('listCount').textContent=filtered.length+' names';
  var h='';for(var i=0;i<filtered.length;i++){var f=filtered[i];var dc='#'+f.col.toString(16).padStart(6,'0');
    var th='';for(var t=0;t<f.tags.length;t++){var ci=CATS[f.tags[t]];if(ci){var hex='#'+ci.c.toString(16).padStart(6,'0');th+='<span class="list-tag" style="background:'+hex+'22;color:'+hex+'">'+ci.label+'</span>'}}
    h+='<div class="list-item" onclick="flyToName(\''+f.name.replace(/'/g,"\\'")+'\')"><div class="list-dot" style="background:'+dc+'"></div><span class="list-name">'+f.name+'</span><div class="list-tags">'+th+'</div></div>'}
  body.innerHTML=h;
}

init();
</script>
